name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # PySide6 needs these to load on a headless Linux runner — pytest-qt
      # imports the Qt platform plugin even with QT_QPA_PLATFORM=offscreen.
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libxkbcommon0 libdbus-1-3 libgl1 libfontconfig1 libxcb-cursor0

      - name: Install packages (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e suite_common -e "inscription[dev]" -e "caseforge[dev]" -e "caseguide[dev]"

      - name: Run suite_common tests
        working-directory: suite_common
        run: pytest tests -q

      - name: Run inscription tests
        working-directory: inscription
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests -q

      - name: Run caseforge tests
        working-directory: caseforge
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests -q

      - name: Run caseguide tests
        working-directory: caseguide
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests -q

      - name: Lint
        run: |
          ruff check suite_common inscription caseforge caseguide

  build-windows:
    name: Build .exe (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packages (editable, with [dev] extras for PyInstaller)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e suite_common -e "inscription[dev]" -e "caseforge[dev]" -e "caseguide[dev]"

      - name: Build all three .exe bundles
        run: .\build.ps1

      - name: Upload Inscription
        uses: actions/upload-artifact@v4
        with:
          name: Inscription-windows
          path: inscription/dist/Inscription/
          if-no-files-found: error

      - name: Upload CaseForge
        uses: actions/upload-artifact@v4
        with:
          name: CaseForge-windows
          path: caseforge/dist/CaseForge/
          if-no-files-found: error

      - name: Upload CaseGuide
        uses: actions/upload-artifact@v4
        with:
          name: CaseGuide-windows
          path: caseguide/dist/CaseGuide/
          if-no-files-found: error
